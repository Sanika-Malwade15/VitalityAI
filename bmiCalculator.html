<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalityAI | Interactive BMI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a;
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Animated Background Mesh */
        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 0% 0%, #1e293b 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, #0f172a 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, #334155 0%, transparent 100%);
        }

        .blob {
            position: absolute;
            width: 500px; height: 500px;
            background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.15;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        /* Back Button Style */
        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-5px);
            border-color: #10b981;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 3rem;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Result Ring Animation */
        .result-ring {
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: scale(0);
        }
        .result-ring.active { transform: scale(1); }

        /* Custom Range Slider */
        input[type=range] { appearance: none; background: rgba(255,255,255,0.1); height: 8px; border-radius: 10px; }
        input[type=range]::-webkit-slider-thumb {
            appearance: none; width: 24px; height: 24px;
            background: #10b981; border: 4px solid #fff;
            border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .category-pill {
            transition: all 0.4s ease;
            opacity: 0.4;
            transform: scale(0.95);
        }
        .category-pill.active {
            opacity: 1;
            transform: scale(1.05);
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <div class="mesh-bg"></div>
    <div class="blob"></div>

    <div class="w-full max-w-5xl mb-8 flex justify-start">
        <a href="dashboard.html" class="back-btn px-6 py-3 rounded-2xl flex items-center gap-3 text-sm font-bold group">
            <i data-lucide="arrow-left" class="w-4 h-4 text-emerald-400 group-hover:-translate-x-1 transition-transform"></i>
            BACK TO DASHBOARD
        </a>
    </div>

    <div class="max-w-5xl w-full grid lg:grid-cols-2 gap-8 items-center relative z-10">
        
        <div class="glass-card p-10 lg:p-14">
            <div class="mb-12">
                <h1 class="text-5xl font-extrabold tracking-tighter mb-4 bg-clip-text text-transparent bg-gradient-to-r from-emerald-400 to-cyan-400">
                    Body Metrics.
                </h1>
                <p class="text-slate-400 text-lg">Precise AI-driven health calculation.</p>
            </div>

            <div class="space-y-12">
                <div class="group">
                    <div class="flex justify-between items-end mb-6">
                        <label class="text-slate-300 font-semibold uppercase tracking-widest text-xs">Your Weight</label>
                        <div class="text-right">
                            <span id="w-display" class="text-5xl font-black text-white">72</span>
                            <span class="text-emerald-400 font-bold ml-1 text-xl">KG</span>
                        </div>
                    </div>
                    <input type="range" id="w-input" min="30" max="180" value="72" class="w-full cursor-pointer">
                </div>

                <div class="group">
                    <div class="flex justify-between items-end mb-6">
                        <label class="text-slate-300 font-semibold uppercase tracking-widest text-xs">Your Height</label>
                        <div class="text-right">
                            <span id="h-display" class="text-5xl font-black text-white">175</span>
                            <span class="text-cyan-400 font-bold ml-1 text-xl">CM</span>
                        </div>
                    </div>
                    <input type="range" id="h-input" min="100" max="230" value="175" class="w-full cursor-pointer">
                </div>

                <button onclick="calculate()" class="w-full py-6 bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-black text-xl rounded-2xl transition-all transform hover:scale-[1.02] active:scale-95 shadow-[0_20px_50px_rgba(16,185,129,0.3)] flex items-center justify-center gap-3">
                    <i data-lucide="zap" class="w-6 h-6 fill-current"></i> ANALYZE PHYSIQUE
                </button>
            </div>
        </div>

        <div class="flex flex-col items-center justify-center space-y-8">
            
            <div id="result-container" class="result-ring relative w-80 h-80 rounded-full flex items-center justify-center border-4 border-slate-800 shadow-2xl bg-slate-900/40 backdrop-blur-sm">
                <div class="absolute inset-0 rounded-full border-t-4 border-emerald-500 animate-spin" style="animation-duration: 3s;"></div>
                <div class="text-center">
                    <span id="bmi-val" class="text-8xl font-black block leading-none">23.5</span>
                    <span id="bmi-cat" class="text-emerald-400 font-bold tracking-widest uppercase mt-2 block italic">Healthy</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 w-full max-w-sm">
                <div id="cat-under" class="category-pill border border-slate-700 p-4 rounded-2xl text-center bg-slate-900/20">
                    <span class="block text-xs font-bold text-slate-500 mb-1">Underweight</span>
                    <span class="text-blue-400 font-bold text-lg"> < 18.5 </span>
                </div>
                <div id="cat-normal" class="category-pill border border-slate-700 p-4 rounded-2xl text-center bg-slate-900/20">
                    <span class="block text-xs font-bold text-slate-500 mb-1">Normal</span>
                    <span class="text-emerald-400 font-bold text-lg">18.5 - 25</span>
                </div>
                <div id="cat-over" class="category-pill border border-slate-700 p-4 rounded-2xl text-center bg-slate-900/20">
                    <span class="block text-xs font-bold text-slate-500 mb-1">Overweight</span>
                    <span class="text-orange-400 font-bold text-lg">25 - 30</span>
                </div>
                <div id="cat-obese" class="category-pill border border-slate-700 p-4 rounded-2xl text-center bg-slate-900/20">
                    <span class="block text-xs font-bold text-slate-500 mb-1">Obese</span>
                    <span class="text-red-400 font-bold text-lg"> > 30 </span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        const wIn = document.getElementById('w-input');
        const hIn = document.getElementById('h-input');
        const wDis = document.getElementById('w-display');
        const hDis = document.getElementById('h-display');
        const bmiVal = document.getElementById('bmi-val');
        const bmiCat = document.getElementById('bmi-cat');
        const resCon = document.getElementById('result-container');

        const pills = {
            under: document.getElementById('cat-under'),
            normal: document.getElementById('cat-normal'),
            over: document.getElementById('cat-over'),
            obese: document.getElementById('cat-obese')
        };

        function updateSliders() {
            wDis.innerText = wIn.value;
            hDis.innerText = hIn.value;
        }

        wIn.addEventListener('input', updateSliders);
        hIn.addEventListener('input', updateSliders);

        function calculate() {
            const bmi = (wIn.value / ((hIn.value/100)**2)).toFixed(1);
            
            // Pulse animation out
            resCon.classList.remove('active');
            
            setTimeout(() => {
                bmiVal.innerText = bmi;
                resCon.classList.add('active');
                updateStatus(bmi);
            }, 100);
        }

        function updateStatus(bmi) {
            // Reset Pills
            Object.values(pills).forEach(p => p.classList.remove('active'));
            
            let color = "#10b981";
            let status = "Normal";

            if(bmi < 18.5) {
                status = "Underweight";
                color = "#3b82f6";
                pills.under.classList.add('active');
            } else if(bmi < 25) {
                status = "Healthy";
                color = "#10b981";
                pills.normal.classList.add('active');
            } else if(bmi < 30) {
                status = "Overweight";
                color = "#f59e0b";
                pills.over.classList.add('active');
            } else {
                status = "Obese";
                color = "#ef4444";
                pills.obese.classList.add('active');
            }

            bmiCat.innerText = status;
            bmiCat.style.color = color;
            resCon.style.borderColor = color;
            resCon.style.boxShadow = `0 0 60px ${color}20`;
        }

        // Run calculation once on load
        calculate();
    </script>
</body>
</html>
